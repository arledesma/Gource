name: CI

on:
  push:
    branches: [gource-tui, main]
  pull_request:
    branches: [gource-tui, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

  release:
    if: github.ref == 'refs/heads/gource-tui'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - name: Set version
        id: version
        run: echo "version=$(date -u +%Y.%m.%d)-$(echo $GITHUB_SHA | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          LDFLAGS="-X main.version=${VERSION}"
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o gource-tui-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-windows-amd64.exe .

      - name: Update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing release if present
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Create new release
          gh release create latest \
            --title "Latest (${{ steps.version.outputs.version }})" \
            --notes "Built from ${{ github.sha }}" \
            --latest \
            gource-tui-linux-amd64 \
            gource-tui-darwin-amd64 \
            gource-tui-darwin-arm64 \
            gource-tui-windows-amd64.exe
