name: CI

on:
  push:
    branches: [gource-tui, main]
  pull_request:
    branches: [gource-tui, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.24"

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

  release:
    if: github.ref == 'refs/heads/gource-tui'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.24"

      - name: Generate calver tag
        id: calver
        run: |
          TAG=$(date -u +%Y.%m.%d)
          COUNT=$(git tag -l "${TAG}.*" | wc -l)
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            TAG="${TAG}.$((COUNT + 1))"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.calver.outputs.tag }}
        run: |
          LDFLAGS="-X main.version=${VERSION}"
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o gource-tui-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-windows-amd64.exe .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.calver.outputs.tag }}" \
            --title "${{ steps.calver.outputs.tag }}" \
            --generate-notes \
            gource-tui-linux-amd64 \
            gource-tui-darwin-amd64 \
            gource-tui-darwin-arm64 \
            gource-tui-windows-amd64.exe
