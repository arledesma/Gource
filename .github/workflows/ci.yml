name: CI

on:
  push:
    branches: [gource-tui, main]
  pull_request:
    branches: [gource-tui, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

  release:
    if: github.ref == 'refs/heads/gource-tui'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Generate calver tag
        id: calver
        run: |
          TAG=$(date -u +%Y.%m.%d)
          # Append build number if tag already exists
          COUNT=$(git tag -l "${TAG}.*" | wc -l)
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            TAG="${TAG}.$((COUNT + 1))"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Generated tag: ${TAG}"

      - name: Build binaries
        env:
          VERSION: ${{ steps.calver.outputs.tag }}
        run: |
          LDFLAGS="-X main.version=${VERSION}"
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o gource-tui-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o gource-tui-windows-amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.tag }}
          name: ${{ steps.calver.outputs.tag }}
          files: |
            gource-tui-linux-amd64
            gource-tui-darwin-amd64
            gource-tui-darwin-arm64
            gource-tui-windows-amd64.exe
          generate_release_notes: true
          make_latest: true
